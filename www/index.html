<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>webserv</title>
        <style>
            body {
                display: flex;
                flex-direction: column;
                align-items: center;
                background-color: #2b2b2b;
                color: #e0e0e0;
            }
        </style>
    </head>
    <body>
        <h2>webserv</h2>
        <p>Welcome to the main page of webserv!</p>
        <p>Use this input form for creating a "sentence.txt" file with a custom content:</p>
        <form method="POST" action="/submit">
            <label for="sentence">Sentence:</label>
            <input
                type="text"
                id="sentence"
                name="sentence"
                placeholder="Enter a sentence"
            />
            <button type="submit">Submit</button>
        </form>
    </body>
</html>
