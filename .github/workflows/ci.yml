name: Webserv CI/CD

# Trigger workflow
on:
  push:
  pull_request:
    branches: ["main"]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build image
        run: docker build -t webserv:1 .

      - name: Compile Unit Tests
        run: |
          cd tests
          make

      - name: Run Unit Tests
        run: |
          cd tests
          ./tester

      - name: Run Integration Test
        run: |
          # start server
          docker run --rm -p 8080:8080 webserv:1

          # setup-time
          sleep 1

          # curl-test
          RESPONSE=$(curl -s http://localhost:8080/)

          # shut-down server
          kill $SERVER_PID

          # check response
          if [[ "$RESPONSE" !=  *"Hello from epoll"* ]]; then
            echo "Intergration Test Failed: Unexpected response -> $RESPONSE"
            exit 1
          fi

          echo "Integration Test Passed!"
