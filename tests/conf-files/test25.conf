server {
    listen 1024;
    location / {
    }

    location /submit/ {
        methods POST;
        client_max_body_size 20;
        index sentence.txt;
    }

	location /cgi-bin/ {
    	cgi_pass .py /usr/bin/python3;
    	cgi_pass .sh /bin/bash;
	}
}

server {
    listen 1025;
    location /white/ {
        index index_white.html;
    }
}

server {
    listen 1026;
    root www/green;
    index index_green.html;
    location / {
    }
}
